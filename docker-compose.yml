# ==============================================================================
# Volumes — Persistent Data Storage
# ==============================================================================
volumes:
  # Core services
  postgres_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  
  # Collective memory (skills are bind-mounted, not a volume)
  collective_memory:
    driver: local
  
  # Per-agent memory persistence
  agent_memory_steward:
    driver: local
  agent_memory_alpha:
    driver: local
  agent_memory_beta:
    driver: local
  agent_memory_charlie:
    driver: local
  agent_memory_examiner:
    driver: local
  agent_memory_explorer:
    driver: local
  agent_memory_sentinel:
    driver: local
  agent_memory_coder:
    driver: local
  agent_memory_dreamer:
    driver: local
  agent_memory_empath:
    driver: local
  agent_memory_historian:
    driver: local

# ==============================================================================
# Networks — Container Communication
# ==============================================================================
networks:
  heretek-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
