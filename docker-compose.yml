# ==============================================================================
# Heretek OpenClaw — Infrastructure Services v2.0
# ==============================================================================
# Configuration: AMD GPU + MiniMax Primary + z.ai Failover
# Passthrough Endpoints: Per-agent virtual models in LiteLLM
#
# Architecture:
#   ┌─────────────────────────────────────────────────────────────────────────┐
#   │                      Heretek OpenClaw Stack                             │
#   │  ┌─────────────────────────────────────────────────────────────────┐   │
#   │  │                     Core Services                                │   │
#   │  │  ┌──────────┐  ┌──────────┐  ┌──────────┐  ┌──────────────────┐ │   │
#   │  │  │ LiteLLM  │  │PostgreSQL│  │  Redis   │  │     Ollama       │ │   │
#   │  │  │  :4000   │  │  :5432   │  │  :6379   │  │  :11434 (AMD)    │ │   │
#   │  │  │ Gateway  │  │ +pgvector│  │  Cache   │  │  Local LLM       │ │   │
#   │  │  └──────────┘  └──────────┘  └──────────┘  └──────────────────┘ │   │
#   │  └─────────────────────────────────────────────────────────────────┘   │
#   │  ┌─────────────────────────────────────────────────────────────────┐   │
#   │  │                  Agent Collective (11 Agents)                    │   │
#   │  │  ┌────────┐ ┌────────┐ ┌────────┐ ┌────────┐ ┌────────┐        │   │
#   │  │  │Steward │ │ Alpha  │ │  Beta  │ │Charlie │ │Examiner│        │   │
#   │  │  │ :8001  │ │ :8002  │ │ :8003  │ │ :8004  │ │ :8005  │        │   │
#   │  │  └────────┘ └────────┘ └────────┘ └────────┘ └────────┘        │   │
#   │  │  ┌────────┐ ┌────────┐ ┌────────┐ ┌────────┐ ┌────────┐        │   │
#   │  │  │Explorer│ │Sentinel│ │ Coder  │ │Dreamer │ │ Empath │        │   │
#   │  │  │ :8006  │ │ :8007  │ │ :8008  │ │ :8009  │ │ :8010  │        │   │
#   │  │  └────────┘ └────────┘ └────────┘ └────────┘ └────────┘        │   │
#   │  │  ┌────────┐                                                      │   │
#   │  │  │Historian│                                                     │   │
#   │  │  │ :8011  │                                                      │   │
#   │  │  └────────┘                                                      │   │
#   │  └─────────────────────────────────────────────────────────────────┘   │
#   │  ┌─────────────────────────────────────────────────────────────────┐   │
#   │  │                     Web Interface                                │   │
#   │  │  ┌────────────────────────────────────────────────────────────┐ │   │
#   │  │  │                    Web Dashboard (:3000)                   │ │   │
#   │  │  │  SvelteKit • TypeScript • TailwindCSS • WebSocket          │ │   │
#   │  │  └────────────────────────────────────────────────────────────┘ │   │
#   │  └─────────────────────────────────────────────────────────────────┘   │
#   └─────────────────────────────────────────────────────────────────────────┘
#
# Usage:
#   docker compose up -d
#   docker compose logs -f litellm
#   docker compose down (stops containers)
#   docker compose down -v (stops + removes volumes)
#
# Default Ports:
#   litellm:    4000 (Gateway + A2A)
#   postgres:   5432 (Database + Vector)
#   redis:      6379 (Cache + Rate Limiting)
#   ollama:     11434 (Local LLM - AMD GPU)
#   web:        3000 (Web Interface Dashboard)
#   agents:     8001-8011 (Steward, Alpha, Beta, Charlie, Examiner, Explorer, Sentinel, Coder, Dreamer, Empath, Historian)
# ==============================================================================

services:
  # ==============================================================================
  # LiteLLM Gateway — Unified LLM API with A2A Protocol
  # ==============================================================================
  # Passthrough Endpoints: Each agent has a virtual model (agent/steward, etc.)
  # Users can reassign models via WebUI without changing openclaw.json
  # ==============================================================================
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: heretek-litellm
    restart: unless-stopped
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    environment:
      # ─────────────────────────────────────────────────────────────────────────
      # LiteLLM Core Settings
      # ─────────────────────────────────────────────────────────────────────────
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
      - LITELLM_SALT_KEY=${LITELLM_SALT_KEY}
      
      # ─────────────────────────────────────────────────────────────────────────
      # Database & Cache Connections
      # ─────────────────────────────────────────────────────────────────────────
      - DATABASE_URL=postgresql://${POSTGRES_USER:-heretek}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-heretek}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      
      # ─────────────────────────────────────────────────────────────────────────
      # Provider API Keys
      # ─────────────────────────────────────────────────────────────────────────
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_API_BASE=${MINIMAX_API_BASE:-https://api.minimaxi.chat/v1}
      - ZAI_API_KEY=${ZAI_API_KEY}
      - ZAI_API_BASE=${ZAI_API_BASE:-https://api.z.ai/api/coding/paas/v4}
      
      # ─────────────────────────────────────────────────────────────────────────
      # Ollama Connection
      # ─────────────────────────────────────────────────────────────────────────
      - OLLAMA_HOST=http://ollama:11434
      
      # ─────────────────────────────────────────────────────────────────────────
      # Model Settings
      # ─────────────────────────────────────────────────────────────────────────
      - STORE_MODEL_IN_DB=True
      - LITELLM_DROP_PARAMS=True
      
      # ─────────────────────────────────────────────────────────────────────────
      # A2A (Agent-to-Agent) Protocol Settings
      # ─────────────────────────────────────────────────────────────────────────
      - AGENT_MODE_ENABLED=true
      - AGENT_A2A_VERSION=1.0
      
      # ─────────────────────────────────────────────────────────────────────────
      # UI & Monitoring
      # ─────────────────────────────────────────────────────────────────────────
      - UI_USERNAME=${LITELLM_UI_USERNAME:-admin}
      - UI_PASSWORD=${LITELLM_UI_PASSWORD}
      
      # ─────────────────────────────────────────────────────────────────────────
      # Observability
      # ─────────────────────────────────────────────────────────────────────────
      - LITELLM_COST_TRACKING_ENABLED=${LITELLM_COST_TRACKING_ENABLED:-true}
      - LITELLM_METRICS_ENABLED=${LITELLM_METRICS_ENABLED:-true}
      - LITELLM_LOG_LEVEL=${LOG_LEVEL:-INFO}
    
    command: [
      "--config", "/app/config.yaml",
      "--port", "4000",
      "--num_workers", "4"
    ]
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import socket; s=socket.socket(); s.settimeout(2); s.connect((\"localhost\", 4000)); print(\"healthy\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - heretek-network

  # ==============================================================================
  # PostgreSQL with pgvector — Vector Database for RAG
  # ==============================================================================
  postgres:
    image: pgvector/pgvector:pg17
    container_name: heretek-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-heretek}
      POSTGRES_USER: ${POSTGRES_USER:-heretek}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/pgvector-init.sql:/docker-entrypoint-initdb.d/pgvector-init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-heretek} -d ${POSTGRES_DB:-heretek}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heretek-network

  # ==============================================================================
  # Redis — Caching & Rate Limiting
  # ==============================================================================
  redis:
    image: redis:7-alpine
    container_name: heretek-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - heretek-network

  # ==============================================================================
  # Ollama — Local LLM Runtime (AMD ROCm)
  # ==============================================================================
  # AMD GPU Support: Uses ROCm image with /dev/kfd and /dev/dri devices
  # Embedding Model: nomic-embed-text-v2-moe (768 dimensions)
  # ==============================================================================
  ollama:
    image: ollama/ollama:rocm
    container_name: heretek-ollama
    restart: unless-stopped
    devices:
      - /dev/kfd
      - /dev/dri
    environment:
      - OLLAMA_HOST=0.0.0.0
      - HSA_OVERRIDE_GFX_VERSION=10.3.0
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - heretek-network

  # ==============================================================================
  # Agent Services (8 Agents)
  # ==============================================================================
  # Each agent connects to LiteLLM via passthrough endpoint (agent/{name})
  # Model assignment is managed in LiteLLM WebUI, not in agent config
  # ==============================================================================
  
  # --- Steward (Orchestrator) ---
  steward:
    build:
      context: .
      dockerfile: Dockerfile.agent
      args:
        AGENT_NAME: steward
    container_name: heretek-steward
    restart: unless-stopped
    environment:
      - AGENT_NAME=steward
      - AGENT_ROLE=orchestrator
      - LITELLM_HOST=http://litellm:4000
      - LITELLM_API_KEY=${LITELLM_MASTER_KEY}
      - AGENT_MODEL=agent/steward
      - DATABASE_URL=postgresql://${POSTGRES_USER:-heretek}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-heretek}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LANGFUSE_ENABLED=${LANGFUSE_ENABLED:-false}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - OTEL_ENABLED=${OTEL_ENABLED:-false}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-heretek-agent}
      - OTEL_EXPORTER_TYPE=${OTEL_EXPORTER_TYPE:-console}
      - OTEL_EXPORTER_OTLP_ENDPOINT=${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4318/v1/traces}
      - COLLECTIVE_ID=${COLLECTIVE_ID:-}
      - COLLECTIVE_NAME=${COLLECTIVE_NAME:-heretek-openclaw}
      - COLLECTIVE_URL=${COLLECTIVE_URL:-http://litellm:4000}
      - PEER_COLLECTIVES=${PEER_COLLECTIVES:-}
    volumes:
      - ./agents/steward:/app/agent:ro
      - ./agents/entrypoint.sh:/app/entrypoint.sh:ro
      - ./agents/lib:/app/lib:ro
      - ./skills:/app/skills:ro
      - agent_memory_steward:/app/memory
      - collective_memory:/app/collective
      - ./modules:/app/modules:ro
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      litellm:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - heretek-network

  # --- Alpha (Triad) ---
  alpha:
