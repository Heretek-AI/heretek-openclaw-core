      model: ollama/llama3.1:8b
      api_key: os.environ/OLLAMA_API_KEY
      api_base: http://ollama:11434
      num_retries: 0

  # -------------------------------------------------------------------------
  # Additional Ollama Models
  # -------------------------------------------------------------------------
  - model_name: llama3
    litellm_params:
      model: ollama/llama3
      api_key: os.environ/OLLAMA_API_KEY
      api_base: http://ollama:11434
      num_retries: 0

  - model_name: qwen2.5:72b
    litellm_params:
      model: ollama/qwen2.5:72b
      api_key: os.environ/OLLAMA_API_KEY
      api_base: http://ollama:11434
