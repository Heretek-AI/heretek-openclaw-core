      api_key: os.environ/OLLAMA_API_KEY
      api_base: http://ollama:11434
      num_retries: 0

  - model_name: qwen2.5:14b
    litellm_params:
      model: ollama/qwen2.5:14b
      api_key: os.environ/OLLAMA_API_KEY
      api_base: http://ollama:11434
      num_retries: 0

  - model_name: qwen2.5:7b
    litellm_params:
      model: ollama/qwen2.5:7b
      api_key: os.environ/OLLAMA_API_KEY
      api_base: http://ollama:11434
      num_retries: 0

  - model_name: mistral
    litellm_params:
      model: ollama/mistral
      api_key: os.environ/OLLAMA_API_KEY
      api_base: http://ollama:11434
      num_retries: 0

  - model_name: phi4
